<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OmniFlow — Static Cloud + Mouse Vortex</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0B0D12; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(function () {
  "use strict";

  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");

  const COLORS = ["#1894E8", "#9F72FF", "#62E2A4", "#627eea", "#0052ff"];
  const PARTICLE_COUNT = 300;
  const VORTEX_RADIUS = 150;
  const SPRING = 0.015;
  const DAMPING = 0.96;
  const BG = "#0B0D12";

  let W, H;
  let mouseX = -9999, mouseY = -9999;
  let particles = [];

  function hexToRGBA(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  class Particle {
    constructor() {
      this.homeX = Math.random() * W;
      this.homeY = Math.random() * H;
      this.x = this.homeX;
      this.y = this.homeY;
      this.prevX = this.x;
      this.prevY = this.y;
      this.vx = 0;
      this.vy = 0;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.opacity = 0.3 + Math.random() * 0.2;
      this.lineWidth = 1 + Math.random();
    }

    update() {
      this.prevX = this.x;
      this.prevY = this.y;

      // Mouse vortex (same as hero-flowfield)
      const dx = this.x - mouseX;
      const dy = this.y - mouseY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < VORTEX_RADIUS && dist > 1) {
        const strength = (1 - dist / VORTEX_RADIUS) * 3;
        const perpX = -dy / dist;
        const perpY = dx / dist;
        const blend = strength / (strength + 1);
        this.vx = this.vx * (1 - blend) + perpX * 3 * blend;
        this.vy = this.vy * (1 - blend) + perpY * 3 * blend;
      }

      // Spring return to home position
      this.vx += (this.homeX - this.x) * SPRING;
      this.vy += (this.homeY - this.y) * SPRING;

      // Damping
      this.vx *= DAMPING;
      this.vy *= DAMPING;

      this.x += this.vx;
      this.y += this.vy;
    }

    draw() {
      ctx.beginPath();
      ctx.moveTo(this.prevX, this.prevY);
      ctx.lineTo(this.x, this.y);
      ctx.strokeStyle = hexToRGBA(this.color, this.opacity);
      ctx.lineWidth = this.lineWidth;
      ctx.stroke();
    }
  }

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    for (const p of particles) {
      p.homeX = Math.random() * W;
      p.homeY = Math.random() * H;
    }
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
  }

  function init() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);
  }

  function animate() {
    // Fading trail (same as hero-flowfield)
    ctx.fillStyle = "rgba(11, 13, 18, 0.05)";
    ctx.fillRect(0, 0, W, H);

    for (const p of particles) {
      p.update();
      p.draw();
    }

    requestAnimationFrame(animate);
  }

  window.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
  });
  window.addEventListener("mouseleave", () => {
    mouseX = -9999;
    mouseY = -9999;
  });

  let resizeTimeout;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(resize, 100);
  });

  init();
  animate();
})();
</script>
</body>
</html>
